<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>CDMS 单离子计数模拟器 V2</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 20px; background: #f5f7fa; color: #333; }
        .container { max-width: 850px; margin: 0 auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #2c3e50; font-size: 22px; }
        .controls { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding: 15px; background: #ecf0f1; border-radius: 8px; flex-wrap: wrap; gap: 10px; }
        .control-group { display: flex; gap: 10px; }
        button { padding: 10px 15px; border: none; border-radius: 5px; background: #3498db; color: white; cursor: pointer; font-weight: bold; font-size: 14px; transition: 0.2s; }
        button:hover { opacity: 0.8; }
        .danger { background: #e74c3c; }
        .warning { background: #f39c12; }
        .secondary { background: #7f8c8d; }
        canvas { display: block; width: 100%; border: 1px solid #bdc3c7; border-radius: 5px; margin-bottom: 20px; background: #fafafa; }
        .stats { text-align: center; font-size: 16px; font-weight: bold; color: #27ae60; margin-bottom: 15px; background: #e8f8f5; padding: 10px; border-radius: 5px; }
        h4 { margin-bottom: 5px; color: #34495e; }
        .highlight-val { color: #e74c3c; font-size: 18px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>FT-ICR / Orbitrap 诱导电流与单离子阶跃信号模拟</h2>
        
        <div class="controls">
            <div>
                <label style="font-weight:bold;">单个离子电荷数 (z): <span id="z-val" style="color:#e74c3c;">20</span></label><br>
                <input type="range" id="z-slider" min="1" max="100" value="20" style="width:150px; margin-top:5px;">
            </div>
            <div class="control-group">
                <button id="add-btn">➕ 注入新离子</button>
                <button id="remove-btn" class="danger">💥 丢失/弹射</button>
            </div>
            <div class="control-group">
                <button id="pause-btn" class="warning">⏸ 暂停 / 继续</button>
                <button id="reset-btn" class="secondary">🔄 重新开始</button>
            </div>
        </div>

        <div class="stats">
            当前离子数量: <span id="count-val">3</span> &nbsp;|&nbsp; 
            阱内总电荷量: <span id="total-val">60</span> &nbsp;|&nbsp; 
            实时诱导电流: <span id="current-val" class="highlight-val">0.00</span>
        </div>
        
        <h4>离子运动轨迹 (分析池内部)</h4>
        <canvas id="trapCanvas" height="120"></canvas>
        
        <h4>检测电极诱导电流时域信号 (Transient)</h4>
        <canvas id="signalCanvas" height="200"></canvas>
    </div>

    <script>
        let ions = [];
        let ionChargeZ = 20;
        let defaultCount = 3;
        let time = 0;
        let isPaused = false;
        const trapWidth = 850; 
        
        let signalHistory = new Array(trapWidth).fill(0);

        function initIons() {
            ions = [];
            for(let i = 0; i < defaultCount; i++) {
                ions.push({ phase: Math.random() * Math.PI * 2 });
            }
            updateStats();
        }

        function updateStats() {
            document.getElementById('z-val').innerText = ionChargeZ;
            document.getElementById('count-val').innerText = ions.length;
            document.getElementById('total-val').innerText = ions.length * ionChargeZ;
        }

        // 交互按键监听
        document.getElementById('z-slider').addEventListener('input', (e) => {
            ionChargeZ = parseInt(e.target.value);
            updateStats();
        });
        
        document.getElementById('add-btn').addEventListener('click', () => {
            ions.push({ phase: Math.random() * Math.PI * 2 });
            updateStats();
        });
        
        document.getElementById('remove-btn').addEventListener('click', () => {
            if(ions.length > 0) ions.pop();
            updateStats();
        });

        document.getElementById('pause-btn').addEventListener('click', (e) => {
            isPaused = !isPaused;
            e.target.innerText = isPaused ? "▶ 继续运行" : "⏸ 暂停 / 继续";
            e.target.style.background = isPaused ? "#27ae60" : "#f39c12";
        });

        document.getElementById('reset-btn').addEventListener('click', () => {
            time = 0;
            signalHistory.fill(0);
            initIons();
            document.getElementById('current-val').innerText = "0.00";
            if (isPaused) {
                isPaused = false;
                let pBtn = document.getElementById('pause-btn');
                pBtn.innerText = "⏸ 暂停 / 继续";
                pBtn.style.background = "#f39c12";
            }
        });

        // Canvas 初始化
        const trapCtx = document.getElementById('trapCanvas').getContext('2d');
        const sigCtx = document.getElementById('signalCanvas').getContext('2d');
        document.getElementById('trapCanvas').width = trapWidth;
        document.getElementById('signalCanvas').width = trapWidth;

        // 主渲染循环
        function animate() {
            // 如果没有暂停，时间才往前走
            if (!isPaused) {
                time += 0.05;
            }
            
            // --- 1. 渲染上方的分析池 ---
            trapCtx.clearRect(0, 0, trapWidth, 120);
            
            // 画两块检测电极
            trapCtx.fillStyle = '#7f8c8d';
            trapCtx.fillRect(100, 10, 20, 100);
            trapCtx.fillRect(trapWidth - 120, 10, 20, 100);
            
            let currentTotalSignal = 0;

            // 画离子，并算出它们此刻产生的总诱导电流
            trapCtx.fillStyle = '#e74c3c';
            ions.forEach(ion => {
                // 离子来回振荡的位移
                let xPos = trapWidth/2 + Math.sin(time + ion.phase) * (trapWidth/2 - 150);
                trapCtx.beginPath();
                trapCtx.arc(xPos, 60, 8, 0, Math.PI*2);
                trapCtx.fill();
                
                // 电流大小 = 速度(位移的导数cos) * 电荷量Z
                let velocity = Math.cos(time + ion.phase); 
                currentTotalSignal += velocity * ionChargeZ;
            });

            // 如果没暂停，就把这一刻的电流值塞进历史记录数组里，并更新屏幕数值
            if (!isPaused) {
                signalHistory.push(currentTotalSignal);
                if(signalHistory.length > trapWidth) signalHistory.shift();
                
                // 更新仪表盘的电流数值，保留两位小数
                document.getElementById('current-val').innerText = currentTotalSignal.toFixed(2);
            }

            // --- 2. 渲染下方的波形图 ---
            sigCtx.clearRect(0, 0, trapWidth, 200);
            
            // 画中心零位基线
            sigCtx.strokeStyle = 'rgba(0,0,0,0.1)';
            sigCtx.beginPath();
            sigCtx.moveTo(0, 100);
            sigCtx.lineTo(trapWidth, 100);
            sigCtx.stroke();

            // 根据历史记录画波形
            sigCtx.strokeStyle = '#2980b9';
            sigCtx.lineWidth = 2;
            sigCtx.beginPath();
            for(let i = 0; i < trapWidth; i++) {
                // 这里的 0.4 是显示比例放大系数，防止波形溢出屏幕
                let y = 100 - (signalHistory[i] * 0.4); 
                if(i === 0) sigCtx.moveTo(i, y);
                else sigCtx.lineTo(i, y);
            }
            sigCtx.stroke();
            
            // 循环调用自己，形成动画
            requestAnimationFrame(animate);
        }

        initIons();
        animate();
    </script>
</body>
</html>
